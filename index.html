<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 טלוויזיה</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap');

  :root {
    --bg:        #0d0f14;
    --surface:   #161a23;
    --panel:     #1e2330;
    --border:    #2a3045;
    --accent:    #4a9eff;
    --accent2:   #2563eb;
    --text:      #e8ecf4;
    --muted:     #7a8499;
    --success:   #22c55e;
    --danger:    #ef4444;
    --radius:    14px;
    --font:      'Heebo', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 18px;
    overflow: hidden;
  }

  /* ─── LOGIN SCREEN ──────────────────────────────────────── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: radial-gradient(ellipse at 60% 40%, #1a2240 0%, #0d0f14 70%);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(74,158,255,.08);
  }

  .login-logo {
    font-size: 56px;
    text-align: center;
    margin-bottom: 8px;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }

  .login-title {
    font-size: 32px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 6px;
    color: var(--text);
  }
  .login-sub {
    text-align: center;
    color: var(--muted);
    margin-bottom: 36px;
    font-size: 16px;
  }

  label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 16px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  input[type=text], input[type=password], input[type=url] {
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 20px;
    padding: 16px 18px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color .2s;
    direction: ltr;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); opacity: .6; }

  .btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: var(--accent2);
    color: #fff;
    font-family: var(--font);
    font-size: 22px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: 8px;
  }
  .btn:hover  { background: var(--accent); }
  .btn:active { transform: scale(.98); }

  .proxy-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .proxy-row input[type=checkbox] {
    width: 20px; height: 20px;
    margin: 0;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .mixed-warn {
    background: rgba(239,68,68,.12);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    color: #fca5a5;
    font-size: 14px;
    padding: 10px 14px;
    margin: 8px 0 0;
    line-height: 1.5;
    display: none;
  }

  .login-error {
    color: var(--danger);
    font-size: 16px;
    text-align: center;
    margin-top: 14px;
    min-height: 22px;
  }

  /* ─── MAIN APP ──────────────────────────────────────────── */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .topbar-logo { font-size: 28px; line-height: 1; }
  .topbar-title {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    flex: 1;
  }
  #status-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    flex-shrink: 0;
  }
  #status-text {
    font-size: 15px;
    color: var(--muted);
  }

  #search-box {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 40px;
    color: var(--text);
    font-family: var(--font);
    font-size: 18px;
    padding: 10px 20px;
    outline: none;
    width: 220px;
    direction: rtl;
    transition: border-color .2s;
  }
  #search-box:focus { border-color: var(--accent); }

  .logout-btn {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 15px;
    padding: 8px 16px;
    border-radius: 40px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  .refresh-btn {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--muted);
    font-size: 22px;
    padding: 6px 14px;
    border-radius: 40px;
    cursor: pointer;
    transition: all .2s;
    line-height: 1;
    flex-shrink: 0;
  }
  .refresh-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .refresh-btn:active { transform: scale(.95); }
  .refresh-btn.spinning { animation: spin .7s linear infinite; }

  .channel-item:focus {
    outline: 3px solid var(--accent);
    background: var(--panel);
  }
  .channel-item:focus .ch-play-icon { opacity: 1; }

  #video-wrapper { cursor: pointer; }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* VIDEO PANEL (left in LTR, right in RTL page → left visually) */
  #player-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    position: relative;
    min-width: 0;
  }

  #video-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    pointer-events: none;
  }
  #placeholder .ph-icon { font-size: 72px; opacity: .4; }
  #placeholder p { font-size: 20px; opacity: .5; }

  #now-playing-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    min-height: 60px;
  }
  #np-icon { font-size: 24px; }
  #np-name {
    font-size: 20px;
    font-weight: 700;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #np-status {
    font-size: 14px;
    color: var(--muted);
  }
  .live-badge {
    background: var(--danger);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .08em;
    animation: livepulse 1.5s ease-in-out infinite;
  }
  @keyframes livepulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .6; }
  }

  /* CHANNEL LIST (right side) */
  #sidebar {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);  /* RTL = right border visually on right */
    overflow: hidden;
  }

  #categories {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  #categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: var(--panel);
    border: 2px solid var(--border);
    color: var(--muted);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 30px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    flex-shrink: 0;
  }
  .cat-btn:hover   { border-color: var(--accent); color: var(--text); }
  .cat-btn.active  { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  #channel-count {
    padding: 10px 16px 4px;
    font-size: 14px;
    color: var(--muted);
    flex-shrink: 0;
  }

  #channel-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #channel-list::-webkit-scrollbar { width: 6px; }
  #channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .15s, transform .1s;
    margin-bottom: 4px;
    border: 2px solid transparent;
  }
  .channel-item:hover  { background: var(--panel); }
  .channel-item.active {
    background: rgba(37,99,235,.18);
    border-color: var(--accent2);
  }
  .channel-item:active { transform: scale(.98); }

  .ch-logo {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    object-fit: contain;
    background: var(--panel);
    flex-shrink: 0;
  }
  .ch-logo-placeholder {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 17px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    line-height: 1.3;
  }
  .ch-cat {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ch-play-icon {
    font-size: 26px;
    color: var(--accent);
    opacity: 0;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  .channel-item:hover .ch-play-icon,
  .channel-item.active .ch-play-icon { opacity: 1; }

  /* LOADING OVERLAY */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,15,20,.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  .spinner {
    width: 60px; height: 60px;
    border: 5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 22px; color: var(--muted); }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 17px;
    padding: 14px 28px;
    border-radius: 40px;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* MOBILE */
  @media (max-width: 700px) {
    html { font-size: 16px; }
    #main { flex-direction: column; }
    #sidebar {
      width: 100%;
      height: 50vh;
      border-right: none;
      border-top: 1px solid var(--border);
      order: 2;
    }
    #player-panel { order: 1; min-height: 220px; flex: none; height: 50vh; }
    #search-box { width: 150px; font-size: 15px; }
    .login-card { padding: 32px 22px; margin: 16px; }
    .login-title { font-size: 26px; }
  }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📺</div>
    <div class="login-title">הטלוויזיה שלי</div>
    <div class="login-sub">ערוצים ישראליים</div>

    <label for="srv">כתובת השרת</label>
    <input type="url" id="srv" placeholder="http://bigotvpro.com:8080" value="http://bigotvpro.com:8080" autocomplete="off" spellcheck="false">

    <label for="usr">שם משתמש</label>
    <input type="text" id="usr" placeholder="username" autocomplete="off" dir="ltr">

    <label for="pwd">סיסמה</label>
    <input type="password" id="pwd" placeholder="password" autocomplete="off" dir="ltr">

    <div class="proxy-row">
      <input type="checkbox" id="proxy-cb">
      <label for="proxy-cb" style="display:inline;text-transform:none;letter-spacing:0;font-size:15px;color:var(--muted);cursor:pointer;">מצב דפדפן — CORS Proxy (נדרש ב-Chrome/Firefox)</label>
    </div>

    <button class="btn" onclick="doLogin()">🚀 כניסה</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════════ LOADING ═══════════════ -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">טוען ערוצים…</p>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span class="topbar-logo">📺</span>
    <span class="topbar-title">הטלוויזיה שלי</span>
    <div id="status-dot"></div>
    <span id="status-text">מחובר</span>
    <input type="text" id="search-box" placeholder="🔍 חיפוש ערוץ…" oninput="filterChannels()" autocomplete="off">
    <button class="logout-btn" onclick="logout()">יציאה ↩</button>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshChannels()" title="רענן ערוצים">⟳</button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- VIDEO -->
    <div id="player-panel">
      <div id="video-wrapper">
        <video id="video" controls playsinline></video>
        <div id="placeholder">
          <div class="ph-icon">📡</div>
          <p>בחר ערוץ מהרשימה</p>
        </div>
      </div>
      <div id="mixed-warn" class="mixed-warn">⚠️ הדפדפן חוסם סטרימינג HTTP מדף HTTPS. פתרונות: (1) פתח את index.html ישירות מהקובץ (file://) · (2) ב-Chrome: לחץ על המנעול ← הגדרות אתר ← תוכן לא בטוח ← אפשר · (3) השתמש באפליקציית ה-Android</div>
      <div id="now-playing-bar">
        <span id="np-icon">📺</span>
        <span id="np-name" style="color:var(--muted)">לא נבחר ערוץ</span>
        <span id="np-status"></span>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="categories"></div>
      <div id="channel-count"></div>
      <div id="channel-list"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- hls.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let creds   = {};
let allCh   = [];   // [{stream_id, name, stream_icon, category_id, category_name}]
let filtCh  = [];   // currently shown
let catMap  = {};   // category_id → name
let activeCatId = 'all';
let hls     = null;
let activeStreamId = null;
let useProxy = false;
const CORS_PROXY = 'https://corsproxy.io/?url=';

// ═══════════════════════════════════════
//  HEBREW / ISRAELI KEYWORDS
// ═══════════════════════════════════════
const IL_KEYWORDS = [
  'heb','hebrew','israel','israeli','il ',
  'כאן','קשת','רשת','ערוץ','ספורט ישראל','ישראל','עברית',
  'reshet','keshet','kan ','sport5','sport 5','ilive',
  'beitar','maccabi','mako','walla','arutz'
];

function isIsraeli(str) {
  const s = (str || '').toLowerCase();
  return IL_KEYWORDS.some(k => s.includes(k));
}

// ═══════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════
function setError(msg) {
  document.getElementById('login-error').textContent = msg;
}

async function doLogin() {
  const srv = document.getElementById('srv').value.trim().replace(/\/$/, '');
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value.trim();
  if (!srv || !usr || !pwd) { setError('אנא מלא את כל השדות'); return; }
  setError('');
  useProxy = document.getElementById('proxy-cb').checked;
  localStorage.setItem('iptv_proxy', useProxy ? '1' : '');
  creds = { srv, usr, pwd };
  localStorage.setItem('iptv_creds', JSON.stringify(creds));
  await loadApp();
}

function logout() {
  localStorage.removeItem('iptv_creds');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  stopPlayer();
  allCh = []; filtCh = [];
}

// ═══════════════════════════════════════
//  STARTUP — auto-login
// ═══════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Auto-enable proxy when served over HTTPS (GitHub Pages etc.)
  const onHttps = window.location.protocol === 'https:';
  const savedProxy = localStorage.getItem('iptv_proxy');
  useProxy = onHttps || savedProxy === '1';
  document.getElementById('proxy-cb').checked = useProxy;

  const saved = localStorage.getItem('iptv_creds');
  if (saved) {
    try {
      creds = JSON.parse(saved);
      document.getElementById('srv').value = creds.srv;
      document.getElementById('usr').value = creds.usr;
      document.getElementById('pwd').value = creds.pwd;
      loadApp();
    } catch(e) { localStorage.removeItem('iptv_creds'); }
  }
});

// ═══════════════════════════════════════
//  LOAD CHANNELS & CATEGORIES
// ═══════════════════════════════════════
async function apiGet(action) {
  let url = `${creds.srv}/player_api.php?username=${encodeURIComponent(creds.usr)}&password=${encodeURIComponent(creds.pwd)}&action=${action}`;
  if (useProxy) url = CORS_PROXY + encodeURIComponent(url);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function loadApp() {
  showLoading('טוען ערוצים…');
  try {
    // Fetch categories + streams in parallel
    const [cats, streams] = await Promise.all([
      apiGet('get_live_categories').catch(() => []),
      apiGet('get_live_streams')
    ]);

    // Build category map
    catMap = {};
    (cats || []).forEach(c => { catMap[c.category_id] = c.category_name || ''; });

    // Filter: only categories containing 'heb', sorted by name
    allCh = (streams || [])
      .filter(ch => (catMap[ch.category_id] || '').toLowerCase().includes('heb'))
      .map(ch => ({ ...ch, category_name: catMap[ch.category_id] || 'כללי' }))
      .sort((a, b) => a.name.localeCompare(b.name));

    if (allCh.length === 0) {
      allCh = (streams || [])
        .map(ch => ({ ...ch, category_name: catMap[ch.category_id] || 'כללי' }))
        .sort((a, b) => a.name.localeCompare(b.name));
      showToast('לא נמצאו ערוצי Hebrew — מציג הכל');
    }

    buildCategories();
    renderChannels(allCh);

    hideLoading();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

  } catch(e) {
    hideLoading();
    setError('שגיאה בחיבור לשרת: ' + e.message);
    document.getElementById('login-screen').style.display = 'flex';
  }
}

// ═══════════════════════════════════════
//  CATEGORY BUTTONS
// ═══════════════════════════════════════
function buildCategories() {
  const usedCatIds = [...new Set(allCh.map(c => c.category_id))];
  const container = document.getElementById('categories');
  container.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = '🌐 הכל';
  allBtn.dataset.cat = 'all';
  allBtn.onclick = () => selectCat('all', allBtn);
  container.appendChild(allBtn);

  usedCatIds.forEach(cid => {
    const name = catMap[cid] || cid;
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = name;
    btn.dataset.cat = cid;
    btn.onclick = () => selectCat(cid, btn);
    container.appendChild(btn);
  });
}

function selectCat(catId, btn) {
  activeCatId = catId;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterChannels();
}

// ═══════════════════════════════════════
//  FILTER + RENDER
// ═══════════════════════════════════════
function filterChannels() {
  const q = document.getElementById('search-box').value.trim().toLowerCase();
  filtCh = allCh.filter(ch => {
    const matchCat = activeCatId === 'all' || ch.category_id == activeCatId;
    const matchQ   = !q || ch.name.toLowerCase().includes(q) || ch.category_name.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderChannels(filtCh);
}

function renderChannels(list) {
  const container = document.getElementById('channel-list');
  document.getElementById('channel-count').textContent = `${list.length} ערוצים`;
  container.innerHTML = '';

  list.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'channel-item' + (ch.stream_id == activeStreamId ? ' active' : '');
    item.dataset.id = ch.stream_id;
    item.setAttribute('tabindex', '0');

    const logoEl = ch.stream_icon
      ? `<img class="ch-logo" src="${escHtml(ch.stream_icon)}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
        + `<div class="ch-logo-placeholder" style="display:none">📺</div>`
      : `<div class="ch-logo-placeholder">📺</div>`;

    item.innerHTML = `
      ${logoEl}
      <div class="ch-info">
        <div class="ch-name">${escHtml(ch.name)}</div>
        <div class="ch-cat">${escHtml(ch.category_name)}</div>
      </div>
      <div class="ch-play-icon">▶</div>
    `;
    item.addEventListener('click', () => playChannel(ch));
    container.appendChild(item);
  });
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════
//  PLAYBACK
// ═══════════════════════════════════════
function buildStreamUrl(ch) {
  return `${creds.srv}/live/${encodeURIComponent(creds.usr)}/${encodeURIComponent(creds.pwd)}/${ch.stream_id}.m3u8`;
}

function playChannel(ch) {
  activeStreamId = ch.stream_id;
  const url = buildStreamUrl(ch);

  // Update UI
  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id == ch.stream_id);
  });
  document.getElementById('np-name').textContent = ch.name;
  document.getElementById('np-name').style.color = '';
  document.getElementById('np-status').innerHTML = '<span class="live-badge">LIVE</span>';
  document.getElementById('placeholder').style.display = 'none';

  // Warn if browser will block HTTP stream from HTTPS page
  const warnEl = document.getElementById('mixed-warn');
  if (warnEl) {
    const isHttpsPage  = window.location.protocol === 'https:';
    const isHttpStream = url.startsWith('http://');
    warnEl.style.display = (isHttpsPage && isHttpStream) ? 'block' : 'none';
  }

  startHLS(url);
}

function startHLS(url) {
  const video = document.getElementById('video');
  stopPlayer();

  if (Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true, maxBufferLength: 20 });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) showToast('שגיאה בהפעלה — נסה ערוץ אחר');
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    video.src = url;
    video.addEventListener('loadedmetadata', () => video.play().catch(()=>{}), { once: true });
  } else {
    showToast('הדפדפן לא תומך ב-HLS');
  }
}

function stopPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  const v = document.getElementById('video');
  v.pause();
  v.src = '';
}

// ═══════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || 'טוען…';
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ═══════════════════════════════════════
//  SCREEN WAKE LOCK (keep screen on)
// ═══════════════════════════════════════
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(_) {}
  }
}
// Re-acquire after tab becomes visible again (OS releases it on tab switch)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();

// ═══════════════════════════════════════
//  REFRESH
// ═══════════════════════════════════════
function refreshChannels() {
  if (!Object.keys(creds).length) return;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  loadApp().finally(() => btn.classList.remove('spinning'));
}

// ═══════════════════════════════════════
//  FULLSCREEN ON VIDEO TAP
// ═══════════════════════════════════════
document.getElementById('video-wrapper').addEventListener('click', () => {
  const video = document.getElementById('video');
  if (!video.src) return;
  if (!document.fullscreenElement) {
    (video.requestFullscreen || video.webkitRequestFullscreen || video.mozRequestFullScreen)
      ?.call(video).catch(() => {});
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen)
      ?.call(document);
  }
});

// ═══════════════════════════════════════
//  KEYBOARD / D-PAD NAVIGATION
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  // Login: Enter submits
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    doLogin(); return;
  }
  if (document.getElementById('app').style.display !== 'flex') return;

  // Exit fullscreen on Back/Escape
  if ((e.key === 'Escape' || e.key === 'Backspace' || e.key === 'GoBack') && document.fullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
    e.preventDefault(); return;
  }

  const list  = document.getElementById('channel-list');
  const items = [...list.querySelectorAll('.channel-item')];
  const idx   = items.indexOf(document.activeElement);

  switch (e.key) {
    case 'ArrowDown':
      e.preventDefault();
      if (idx === -1 && items[0]) items[0].focus();
      else if (items[idx + 1]) { items[idx + 1].focus(); items[idx + 1].scrollIntoView({ block: 'nearest' }); }
      break;
    case 'ArrowUp':
      e.preventDefault();
      if (idx > 0) { items[idx - 1].focus(); items[idx - 1].scrollIntoView({ block: 'nearest' }); }
      break;
    case 'Enter':
      if (idx >= 0) { e.preventDefault(); items[idx].click(); }
      break;
  }
});
</script>
